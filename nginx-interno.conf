server {
    listen 80;
    index index.php index.html;
    server_name _;
    root /var/www/public;

    # Permite subir imágenes/PDFs (licencias, DNI, fotos). Sin esto, nginx usa el
    # default de 1 MB y devuelve 413 antes de llegar a PHP. Alineado con el proxy
    # edge (client_max_body_size 50m) y por debajo de PHP (post_max_size 512M).
    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass kpcars_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 16 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_max_temp_file_size 0;
    }
}