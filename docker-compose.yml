networks:
  kpcars_net:
    driver: bridge

volumes:
  storage_public:
  mysql_data:
  certs:
  vhost:
  html:
  acme:

services:
  db:
    image: mysql:8.0
    container_name: kpcars_db
    networks:
      - kpcars_net
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '127.0.0.1:3307:3306'
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-u',
          'root',
          '-p${DB_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kpcars_app
    image: kpcars_app:latest
    networks:
      - kpcars_net
    env_file:
      - .env
    volumes:
      - storage_public:/var/www/storage/app/public
    healthcheck:
      test: ['CMD', 'cgi-fcgi', '-bind', '-connect', '127.0.0.1:9000']
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: kpcars_web:latest
    container_name: kpcars_nginx_internal
    networks:
      - kpcars_net
    environment:
      - VIRTUAL_HOST=${APP_DOMAIN}
      - LETSENCRYPT_HOST=${APP_DOMAIN}
    expose:
      - '80'
    volumes:
      - storage_public:/var/www/storage/app/public:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # --- Edge reverse proxy: auto-detects containers via Docker socket ---
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx_proxy
    networks:
      - kpcars_net
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped

  # --- SSL certificate manager (Let's Encrypt) ---
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx_proxy_letsencrypt
    networks:
      - kpcars_net
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - NGINX_PROXY_CONTAINER=nginx_proxy
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    restart: unless-stopped
